el": "localizzazione_fisica", "physics": true, "shape": "dot", "title": "Data Property: localizzazione_fisica; range: string"}, {"color": "orange", "id": "settore_intervento", "label": "settore_intervento", "physics": true, "shape": "dot", "title": "Data Property: settore_intervento; range: string"}, {"color": "orange", "id": "finalita", "label": "finalita", "physics": true, "shape": "dot", "title": "Data Property: finalita; range: string"}]);
