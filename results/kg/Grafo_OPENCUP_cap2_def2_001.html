        <script type="text/javascript">

              // initialize global variables.
              var edges;

              var allNodes;
              var allEdges;

              var originalNodes;
              var network;
              var container;
              var options, data;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "id": "beneficiario_finanziamento", "label": "beneficiario_finanziamento", "physics": true, "shape": "box", "title": "Class: beneficiario_finanziamento\n description: Soggetto pubblico o privato che beneficia di finanziamento per specifici progetti di investimento ai sensi delle norme dispositive relative ai programmi di spesa (Delibera CIPE n. 63 del 26 novembre 2020)."}, {"color": "#97c2fc", "id": "soggetto_pubblico_o_privato", "label": "soggetto_pubblico_o_privato", "physics": true, "shape": "box", "title": "Class: soggetto_pubblico_o_privato\n description: Soggetto pubblico o privato."}, {"color": "#97c2fc", "id": "cipess", "label": "cipess", "physics": true, "shape": "box", "title": "Class: cipess\n description: Comitato interministeriale per la programmazione economica e lo sviluppo sostenibile."}, {"color": "#97c2fc", "id": "procedura_telematica_richiesta_cup", "label": "procedura_telematica_richiesta_cup", "physics": true, "shape": "box", "title": "Class: procedura_telematica_richiesta_cup\n description: Procedura telematica di richiesta del CUP."}, {"color": "#97c2fc", "id": "modalita_e_procedure_attuative", "label": "modalita_e_procedure_attuative", "physics": true, "shape": "box", "title": "Class: modalita_e_procedure_attuative\n description: Modalit\u00e0 e procedure attuative del Sistema CUP."}, {"color": "#97c2fc", "id": "sistema_cup", "label": "sistema_cup", "physics": true, "shape": "box", "title": "Class: sistema_cup\n description: Sistema CUP."}]);

                  nodeColors = {};

                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "solver": "forceAtlas2Based", "forceAtlas2Based": {"gravitationalConstant": -120, "centralGravity": 0.01, "springLength": 180, "springConstant": 0.08}, "stabilization": {"enabled": true, "iterations": 400}}, "nodes": {"margin": 10, "font": {"size": 16}}, "interaction": {"dragNodes": true}};
