    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "id": "cup", "label": "cup", "physics": true, "shape": "box", "title": "Class: cup\n description: Classificazione CUP in funzione del suo stato"}, {"color": "#97c2fc", "id": "cup_attivo", "label": "cup_attivo", "physics": true, "shape": "box", "title": "Class: cup_attivo\n description: CUP di un progetto in fase di programmazione/attuazione (Delibera CIPE n. 63 del 26 novembre 2020)"}, {"color": "#97c2fc", "id": "cup_chiuso", "label": "cup_chiuso", "physics": true, "shape": "box", "title": "Class: cup_chiuso\n description: CUP chiuso quando il progetto \u00e8 completato dal punto di vista fisico, tutti i pagamenti e gli incassi sono stati eseguiti ed \u00e8 completato anche l\u2019iter procedurale (Delibera CIPE n. 63 del 26 novembre 2020)"}, {"color": "#97c2fc", "id": "cup_cancellato", "label": "cup_cancellato", "physics": true, "shape": "box", "title": "Class: cup_cancellato\n description: CUP cancellato in quanto generato per errore materiale (Delibera CIPE n. 63 del 26 novembre 2020)"}, {"color": "#97c2fc", "id": "cup_revocato", "label": "cup_revocato", "physics": true, "shape": "box", "title": "Class: cup_revocato\n description: CUP revocato perch\u00e9 il soggetto titolare dell\u2019intervento decide di non realizzarlo prima della sua chiusura (Delibera CIPE n. 63 del 26 novembre 2020)"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "cup_attivo", "label": "is_a", "to": "cup"}, {"arrows": "to", "from": "cup_chiuso", "label": "is_a", "to": "cup"}, {"arrows": "to", "from": "cup_cancellato", "label": "is_a", "to": "cup"}, {"arrows": "to", "from": "cup_revocato", "label": "is_a", "to": "cup"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "solver": "forceAtlas2Based", "forceAtlas2Based": {"gravitationalConstant": -120, "centralGravity": 0.01, "springLength": 180, "springConstant": 0.08}, "stabilization": {"enabled": true, "iterations": 400}}, "nodes": {"margin": 10, "font": {"size": 16}}, "interaction": {"dragNodes": true}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
