 description: Beneficiario degli incentivi concessi"}, {"color": "#97c2fc", "id": "ente_pubblico", "label": "ente_pubblico", "physics": true, "shape": "box", "title": "Class: ente_pubblico\n description: Ente titolare della concessione o della decisione di spesa"}, {"color": "#97c2fc", "id": "soggetto_concentratore", "label": "soggetto_concentratore", "physics": true, "shape": "box", "title": "Class: soggetto_concentratore\n description: Soggetto pubblico abilitato alla richiesta del CUP su delega del soggetto titolare"}]);

                  nodeColors = {};

                  // adding nodes and edges to the graph

                  var options = {"physics": {"enabled": true, "solver": "forceAtlas2Based", "forceAtlas2Based": {"gravitationalConstant": -120, "centralGravity": 0.01, "springLength": 180, "springConstant": 0.08}, "stabilization": {"enabled": true, "iterations": 400}}, "nodes": {"margin": 10, "font": {"size": 16}}, "interaction": {"dragNodes": true}};
