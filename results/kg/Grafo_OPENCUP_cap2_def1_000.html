        <script type="text/javascript">

              // initialize global variables.

              var allNodes;
              var allEdges;

              var network;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "id": "atto_amministrativo", "label": "atto_amministrativo", "physics": true, "shape": "box", "title": "Class: atto_amministrativo\n description: Atto adottato da una pubblica amministrazione"}, {"color": "#97c2fc", "id": "atto_amministrativo_di_investimento_pubblico", "label": "atto_amministrativo_di_investimento_pubblico", "physics": true, "shape": "box", "title": "Class: atto_amministrativo_di_investimento_pubblico\n description: Atto amministrativo anche di natura regolamentare che dispone il finanziamento pubblico o autorizza l\u0027esecuzione di progetti di investimento pubblico"}, {"color": "#97c2fc", "id": "pubblica_amministrazione", "label": "pubblica_amministrazione", "physics": true, "shape": "box", "title": "Class: pubblica_amministrazione\n description: Soggetto di cui all\u2019art. 1, comma 2, d. lgs. n. 165/2001"}, {"color": "#97c2fc", "id": "progetto_di_investimento_pubblico", "label": "progetto_di_investimento_pubblico", "physics": true, "shape": "box", "title": "Class: progetto_di_investimento_pubblico\n description: Progetto finanziato o autorizzato tramite un atto amministrativo di investimento pubblico"}, {"color": "#97c2fc", "id": "codice_unico_progetto", "label": "codice_unico_progetto", "physics": true, "shape": "box", "title": "Class: codice_unico_progetto\n description: Codice che permette di tracciare e monitorare il progetto di investimento pubblico"}, {"color": "#97c2fc", "id": "programma_di_spesa", "label": "programma_di_spesa", "physics": true, "shape": "box", "title": "Class: programma_di_spesa\n description: Programma cui sono autorizzati i progetti tramite l\u2019atto amministrativo"}, {"color": "#97c2fc", "id": "finanziamento_pubblico", "label": "finanziamento_pubblico", "physics": true, "shape": "box", "title": "Class: finanziamento_pubblico\n description: Finanziamenti concessi a valere sulle misure indicate nell\u2019atto amministrativo"}, {"color": "#97c2fc", "id": "delibera", "label": "delibera", "physics": true, "shape": "box", "title": "Class: delibera\n description: Forma in cui pu\u00f2 esplicarsi l\u2019atto amministrativo"}, {"color": "#97c2fc", "id": "provvedimento_dirigenziale", "label": "provvedimento_dirigenziale", "physics": true, "shape": "box", "title": "Class: provvedimento_dirigenziale\n description: Forma in cui pu\u00f2 esplicarsi l\u2019atto amministrativo"}, {"color": "#97c2fc", "id": "decreto", "label": "decreto", "physics": true, "shape": "box", "title": "Class: decreto\n description: Forma in cui pu\u00f2 esplicarsi l\u2019atto amministrativo"}, {"color": "#97c2fc", "id": "provvedimento_approvazione_graduatorie", "label": "provvedimento_approvazione_graduatorie", "physics": true, "shape": "box", "title": "Class: provvedimento_approvazione_graduatorie\n description: Forma in cui pu\u00f2 esplicarsi l\u2019atto amministrativo"}, {"color": "orange", "id": "data_efficacia_finanziamenti", "label": "data_efficacia_finanziamenti", "physics": true, "shape": "dot", "title": "Data Property: data_efficacia_finanziamenti; range: string"}, {"color": "orange", "id": "valore_complessivo_investimento", "label": "valore_complessivo_investimento", "physics": true, "shape": "dot", "title": "Data Property: valore_complessivo_investimento; range: string"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "atto_amministrativo_di_investimento_pubblico", "label": "is_a", "to": "atto_amministrativo"}, {"arrows": "to", "from": "delibera", "label": "is_a", "to": "atto_amministrativo"}, {"arrows": "to", "from": "provvedimento_dirigenziale", "label": "is_a", "to": "atto_amministrativo"}, {"arrows": "to", "from": "decreto", "label": "is_a", "to": "atto_amministrativo"}, {"arrows": "to", "from": "provvedimento_approvazione_graduatorie", "label": "is_a", "to": "atto_amministrativo"}, {"arrows": "to", "from": "atto_amministrativo_di_investimento_pubblico", "label": "adottato_da", "to": "pubblica_amministrazione"}, {"arrows": "to", "from": "atto_amministrativo_di_investimento_pubblico", "label": "dispone_finanziamento", "to": "finanziamento_pubblico"}, {"arrows": "to", "from": "atto_amministrativo_di_investimento_pubblico", "label": "autorizza_esecuzione", "to": "progetto_di_investimento_pubblico"}, {"arrows": "to", "from": "atto_amministrativo_di_investimento_pubblico", "label": "associa_cup", "to": "codice_unico_progetto"}, {"arrows": "to", "from": "atto_amministrativo_di_investimento_pubblico", "label": "autorizza_programma_di_spesa", "to": "programma_di_spesa"}, {"arrows": "to", "color": "orange", "from": "atto_amministrativo_di_investimento_pubblico", "label": "DataProp", "to": "data_efficacia_finanziamenti"}, {"arrows": "to", "color": "orange", "from": "atto_amministrativo_di_investimento_pubblico", "label": "DataProp", "to": "valore_complessivo_investimento"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "solver": "forceAtlas2Based", "forceAtlas2Based": {"gravitationalConstant": -120, "centralGravity": 0.01, "springLength": 180, "springConstant": 0.08}, "stabilization": {"enabled": true, "iterations": 400}}, "nodes": {"margin": 10, "font": {"size": 16}}, "interaction": {"dragNodes": true}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
