        <div class="card" style="width: 100%">

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "id": "cup", "label": "cup", "physics": true, "shape": "box", "title": "Class: cup\n description: Codice Unico di Progetto nell\u0027ambito degli investimenti pubblici"}, {"color": "#97c2fc", "id": "cup_valido", "label": "cup_valido", "physics": true, "shape": "box", "title": "Class: cup_valido\n description: CUP definitivo generato ed esistente all\u2019interno del sistema informativo CUP"}, {"color": "#97c2fc", "id": "cup_corretto", "label": "cup_corretto", "physics": true, "shape": "box", "title": "Class: cup_corretto\n description: CUP definitivo allegato ad un atto di finanziamento/autorizzazione di investimenti pubblici, che identifica un intervento/progetto che l\u2019amministrazione titolare manifesta di voler realizzare"}, {"color": "#97c2fc", "id": "cup_coerente_con_il_programma_di_spesa", "label": "cup_coerente_con_il_programma_di_spesa", "physics": true, "shape": "box", "title": "Class: cup_coerente_con_il_programma_di_spesa\n description: CUP allegato ad un atto amministrativo la cui classificazione rispetta i vincoli disposti dalla normativa che regola il programma di spesa"}, {"color": "#97c2fc", "id": "cup_provvisorio", "label": "cup_provvisorio", "physics": true, "shape": "box", "title": "Class: cup_provvisorio\n description: CUP facoltativo, privo di rilevanza amministrativa, utilizzato per censire il progetto sin dalla fase ideativa; contiene un carattere in meno del CUP definitivo e inizia con PROV"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "cup_valido", "label": "is_a", "to": "cup"}, {"arrows": "to", "from": "cup_corretto", "label": "is_a", "to": "cup"}, {"arrows": "to", "from": "cup_coerente_con_il_programma_di_spesa", "label": "is_a", "to": "cup"}, {"arrows": "to", "from": "cup_provvisorio", "label": "is_a", "to": "cup"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "solver": "forceAtlas2Based", "forceAtlas2Based": {"gravitationalConstant": -120, "centralGravity": 0.01, "springLength": 180, "springConstant": 0.08}, "stabilization": {"enabled": true, "iterations": 400}}, "nodes": {"margin": 10, "font": {"size": 16}}, "interaction": {"dragNodes": true}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
