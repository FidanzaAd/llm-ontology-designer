        <script type="text/javascript">

              // initialize global variables.

              var allEdges;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "id": "cup", "label": "cup", "physics": true, "shape": "box", "title": "Class: cup\n description: Codice alfanumerico univoco, costituito da quindici caratteri, che identifica ciascun intervento/progetto di investimento pubblico"}, {"color": "#97c2fc", "id": "intervento_progetto_investimento_pubblico", "label": "intervento_progetto_investimento_pubblico", "physics": true, "shape": "box", "title": "Class: intervento_progetto_investimento_pubblico\n description: Intervento o progetto di investimento pubblico identificato dal CUP"}, {"color": "#97c2fc", "id": "amministrazione_titolare", "label": "amministrazione_titolare", "physics": true, "shape": "box", "title": "Class: amministrazione_titolare\n description: Soggetto responsabile dell\u2019associazione del CUP agli interventi/progetti di investimento pubblico"}, {"color": "#97c2fc", "id": "soggetto_attuatore", "label": "soggetto_attuatore", "physics": true, "shape": "box", "title": "Class: soggetto_attuatore\n description: Soggetto attuatore degli interventi/progetti di investimento pubblico"}, {"color": "#97c2fc", "id": "sistema_informativo_cup", "label": "sistema_informativo_cup", "physics": true, "shape": "box", "title": "Class: sistema_informativo_cup\n description: Sistema informativo presso cui viene generato il CUP previo accreditamento"}, {"color": "#97c2fc", "id": "banca_dati", "label": "banca_dati", "physics": true, "shape": "box", "title": "Class: banca_dati\n description: Banche dati contenenti informazioni sullo stato di attuazione degli investimenti pubblici"}, {"color": "#97c2fc", "id": "documento_amministrativo_contabile", "label": "documento_amministrativo_contabile", "physics": true, "shape": "box", "title": "Class: documento_amministrativo_contabile\n description: Documenti amministrativi e contabili, cartacei e informatici, relativi a progetti d\u2019investimento pubblico"}, {"color": "orange", "id": "codice_cup", "label": "codice_cup", "physics": true, "shape": "dot", "title": "Data Property: codice_cup; range: string (alfanumerico, 15 caratteri)"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "cup", "label": "identifica", "to": "intervento_progetto_investimento_pubblico"}, {"arrows": "to", "from": "cup", "label": "associato_da", "to": "amministrazione_titolare"}, {"arrows": "to", "from": "cup", "label": "associato_da", "to": "soggetto_attuatore"}, {"arrows": "to", "from": "cup", "label": "generato_in", "to": "sistema_informativo_cup"}, {"arrows": "to", "from": "cup", "label": "rende_interoperabili", "to": "banca_dati"}, {"arrows": "to", "from": "cup", "label": "riportato_su", "to": "documento_amministrativo_contabile"}, {"arrows": "to", "color": "orange", "from": "cup", "label": "DataProp", "to": "codice_cup"}]);

                  nodeColors = {};

                  for (nodeId in allNodes) {

                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "solver": "forceAtlas2Based", "forceAtlas2Based": {"gravitationalConstant": -120, "centralGravity": 0.01, "springLength": 180, "springConstant": 0.08}, "stabilization": {"enabled": true, "iterations": 400}}, "nodes": {"margin": 10, "font": {"size": 16}}, "interaction": {"dragNodes": true}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
